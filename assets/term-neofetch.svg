      <text x="260" y="322"><tspan fill="#bb9af7" font-weight="bold">Velocity:</tspan><tspan fill="#c0caf5"> idea → production in minutes, safely</tspan></text>
      <text x="260" y="342"><tspan fill="#bb9af7" font-weight="bold">Automation:</tspan><tspan fill="#c0caf5"> zero manual toil — everything as code</tspan></text>
      <text x="260" y="362"><tspan fill="#bb9af7" font-weight="bold">Security:</tspan><tspan fill="#c0caf5"> hardened supply chain · scanned containers</tspan></text>
