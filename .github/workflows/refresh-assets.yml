name: Refresh terminal assets

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: rebuild term-stack.svg from skillicons.dev
        run: |
          curl -fsSL "https://skillicons.dev/icons?i=kubernetes,docker,aws,terraform,ansible,githubactions,gitlab,jenkins,bash,py,linux,git&perLine=12" -o /tmp/icons.svg
          # bail out if skillicons changed its output format, rather than committing a broken strip
          grep -q '<svg width="666.75" height="48" ' /tmp/icons.svg
          sed -i 's|<svg width="666.75" height="48" |<svg x="116.5" y="64" width="666.75" height="48" |' /tmp/icons.svg
          {
            echo '<svg xmlns="http://www.w3.org/2000/svg" width="900" height="132" viewBox="0 0 900 132">'
            echo '  <rect x="0" y="0" width="900" height="132" fill="#1a1b27"/>'
            echo '  <line x1="0.5" y1="0" x2="0.5" y2="132" stroke="#3b4261"/>'
            echo '  <line x1="899.5" y1="0" x2="899.5" y2="132" stroke="#3b4261"/>'
            echo "  <text x=\"24\" y=\"28\" font-family=\"'Cascadia Code','Fira Code',Consolas,'DejaVu Sans Mono',monospace\" font-size=\"13\" xml:space=\"preserve\"><tspan fill=\"#9ece6a\">\$</tspan><tspan fill=\"#7dcfff\"> ls</tspan><tspan fill=\"#e0af68\"> ~/stack</tspan></text>"
            cat /tmp/icons.svg
            echo '</svg>'
          } > assets/term-stack.svg

      - name: commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/term-stack.svg
          git diff --cached --quiet || { git commit -m "chore: refresh terminal stack icons"; git push; }
